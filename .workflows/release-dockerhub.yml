name: Release Docker Images

on:
  release:
    types:
      - published

jobs:
  docker-release:
    name: Build and push images
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Validate release version and Docker Hub credentials
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME:-}"
          if [ -z "$VERSION" ]; then
            VERSION="latest"
          else
            VERSION="${VERSION#v}"
            VERSION="${VERSION#V}"
            if [ -z "$VERSION" ]; then
              VERSION="latest"
            fi
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          if [ -z "${DOCKERHUB_USERNAME:-}" ] || [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "Missing DOCKERHUB_USERNAME or DOCKERHUB_TOKEN repository secret."
            exit 1
          fi

      - name: Login to Docker Hub
        run: |
          set -eu
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build and push backend image
        run: |
          set -eu
          VERSION_IMAGE="gitpier/backend:${VERSION}"
          LATEST_IMAGE="gitpier/backend:latest"
          if [ "$VERSION" = "latest" ]; then
            docker build -f backend/Dockerfile -t "$LATEST_IMAGE" backend
          else
            docker build -f backend/Dockerfile -t "$VERSION_IMAGE" -t "$LATEST_IMAGE" backend
          fi
          docker push "$VERSION_IMAGE"
          if [ "$VERSION" != "latest" ]; then
            docker push "$LATEST_IMAGE"
          fi

      - name: Build and push frontend image
        run: |
          set -eu
          VERSION_IMAGE="gitpier/frontend:${VERSION}"
          LATEST_IMAGE="gitpier/frontend:latest"
          if [ "$VERSION" = "latest" ]; then
            docker build -f frontend/Dockerfile -t "$LATEST_IMAGE" frontend
          else
            docker build -f frontend/Dockerfile -t "$VERSION_IMAGE" -t "$LATEST_IMAGE" frontend
          fi
          docker push "$VERSION_IMAGE"
          if [ "$VERSION" != "latest" ]; then
            docker push "$LATEST_IMAGE"
          fi

      - name: Build and push action-runner image
        run: |
          set -eu
          VERSION_IMAGE="gitpier/action-runner:${VERSION}"
          LATEST_IMAGE="gitpier/action-runner:latest"
          if [ "$VERSION" = "latest" ]; then
            docker build -f action-runner/Dockerfile -t "$LATEST_IMAGE" action-runner
          else
            docker build -f action-runner/Dockerfile -t "$VERSION_IMAGE" -t "$LATEST_IMAGE" action-runner
          fi
          docker push "$VERSION_IMAGE"
          if [ "$VERSION" != "latest" ]; then
            docker push "$LATEST_IMAGE"
          fi
